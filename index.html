<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobShift | AI Job Exposure Report</title>
  <meta name="description" content="A bilingual report comparing jobs that are more exposed and less exposed to AI-driven change, based on the mariodian/jobs filters branch dataset." />
  <link rel="canonical" href="https://jobshift.xiangli.dev/" />
  <meta property="og:title" content="AI Job Exposure Report" />
  <meta property="og:description" content="Which jobs are easier for AI to reshape, and which still rely more on people." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://jobshift.xiangli.dev/" />
  <meta property="og:image" content="https://jobshift.xiangli.dev/assets/og-preview.png" />
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:title" content="AI Job Exposure Report" />
  <meta property="twitter:description" content="Which jobs are easier for AI to reshape, and which still rely more on people." />
  <meta property="twitter:image" content="https://jobshift.xiangli.dev/assets/og-preview.png" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <style>
    :root {
      --bg: #08111f;
      --panel: rgba(15, 23, 42, 0.82);
      --border: rgba(255,255,255,.09);
      --ink: #edf4ff;
      --muted: #b4bfd5;
      --soft: #dbeafe;
      --danger: #ef4444;
      --danger-soft: rgba(239,68,68,.12);
      --safe: #16a34a;
      --safe-soft: rgba(22,163,74,.12);
      --mid: #60a5fa;
      --mid-soft: rgba(96,165,250,.10);
      --shadow: 0 18px 48px rgba(0,0,0,.24);
      --radius: 24px;
      --max: 1240px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 0%, rgba(59,130,246,.16), transparent 28%),
        radial-gradient(circle at 80% 0%, rgba(99,102,241,.18), transparent 30%),
        linear-gradient(180deg, #08111f 0%, #091425 100%);
      line-height: 1.6;
    }
    a { color: #93c5fd; }
    .wrap { max-width: var(--max); margin: 0 auto; padding: 24px 18px 56px; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 18px;
      position: sticky; top: 0; z-index: 20; backdrop-filter: blur(10px);
      background: rgba(8,17,31,.58); padding: 10px 0 12px;
    }
    .brand { display: flex; align-items: center; gap: 12px; color: var(--soft); text-decoration: none; }
    .brand-badge {
      width: 40px; height: 40px; border-radius: 14px;
      background: linear-gradient(135deg, rgba(59,130,246,.28), rgba(168,85,247,.28));
      border: 1px solid var(--border); display: grid; place-items: center; font-weight: 700;
      flex: 0 0 auto;
    }
    .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .navlink, .lang-btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,.05);
      color: var(--muted);
      cursor: pointer;
      padding: 8px 14px;
      border-radius: 999px;
      font: inherit;
      font-weight: 600;
      text-decoration: none;
    }
    .navlink:hover, .lang-btn:hover { color: white; }
    .lang-toggle { display: inline-flex; padding: 4px; background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 999px; }
    .lang-btn { border: 0; background: transparent; }
    .lang-btn.active { background: rgba(255,255,255,.12); color: white; }
    .hero {
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px;
      overflow: hidden;
      position: relative;
    }
    .hero::after {
      content: "";
      position: absolute; inset: auto -80px -80px auto; width: 240px; height: 240px; border-radius: 50%;
      background: radial-gradient(circle, rgba(96,165,250,.22) 0%, transparent 70%);
      pointer-events: none;
    }
    .kicker {
      display: inline-flex; align-items: center; gap: 10px; border: 1px solid var(--border); border-radius: 999px;
      padding: 8px 12px; background: rgba(255,255,255,.04); color: var(--soft); font-size: 13px;
    }
    .hero h1 { margin: 16px 0 10px; font-size: clamp(32px, 6vw, 56px); line-height: 1.06; max-width: 980px; }
    .hero p { margin: 0; max-width: 880px; color: var(--muted); font-size: 17px; }
    .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 22px; }
    .anchor-btn {
      display: inline-flex; align-items: center; gap: 10px; padding: 11px 16px; border-radius: 999px; text-decoration: none;
      border: 1px solid var(--border); background: rgba(255,255,255,.05); color: white; font-weight: 600;
    }
    .grid { display: grid; gap: 16px; }
    .cards { grid-template-columns: repeat(4, minmax(0, 1fr)); margin-top: 20px; }
    .insight-cards { grid-template-columns: repeat(3, minmax(0, 1fr)); margin-top: 16px; }
    .legend, .sources, .duo, .takeaways { display: grid; gap: 16px; }
    .legend { grid-template-columns: repeat(3, minmax(0, 1fr)); margin-top: 18px; }
    .sources { grid-template-columns: 1fr 1fr; margin-top: 18px; }
    .duo { grid-template-columns: 1fr 1fr; }
    .takeaways { grid-template-columns: 1.2fr .8fr; margin-top: 18px; }
    .card {
      background: var(--panel);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .eyebrow { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
    .metric-value { font-size: clamp(28px, 4vw, 40px); font-weight: 760; line-height: 1.05; }
    .metric-text { color: var(--muted); font-size: 14px; margin-top: 8px; }
    .mini-note { color: var(--muted); font-size: 12px; margin-top: 6px; }
    .legend-item, .callout, .mini-card {
      border: 1px solid var(--border); border-radius: 20px; padding: 16px; background: rgba(255,255,255,.03);
    }
    .mini-card h3, .legend-item h3 { margin: 10px 0 6px; font-size: 18px; }
    .mini-card p, .legend-item p, .callout p { color: var(--muted); margin: 0; }
    .tag {
      display: inline-flex; align-items: center; gap: 8px; border-radius: 999px; padding: 7px 11px; font-size: 12px;
      font-weight: 700; border: 1px solid var(--border);
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .tag.high { background: var(--danger-soft); }
    .tag.high .dot { background: var(--danger); }
    .tag.low { background: var(--safe-soft); }
    .tag.low .dot { background: var(--safe); }
    .tag.mid { background: var(--mid-soft); }
    .tag.mid .dot { background: var(--mid); }
    .section-title { margin: 28px 0 12px; font-size: clamp(24px, 3vw, 34px); }
    .section-text { color: var(--muted); max-width: 920px; margin: 0 0 16px; }
    .report-panel {
      position: relative; overflow: hidden; padding: 22px; background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
    }
    .report-panel.high { outline: 1px solid rgba(239,68,68,.18); }
    .report-panel.low { outline: 1px solid rgba(22,163,74,.18); }
    .report-panel h3 { margin: 14px 0 8px; font-size: 28px; }
    .report-panel p { margin: 0; color: var(--muted); }
    .stat-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-top: 18px; }
    .stat { border: 1px solid var(--border); border-radius: 18px; padding: 14px; background: rgba(255,255,255,.03); }
    .stat strong { display: block; font-size: 24px; line-height: 1.1; margin-bottom: 6px; }
    .stat span { color: var(--muted); font-size: 13px; }
    .compare-wrap { margin-top: 8px; }
    .compare-row {
      display: grid; grid-template-columns: 170px 1fr; gap: 12px; align-items: start; padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .compare-label { font-weight: 650; }
    .bar-group { display: grid; gap: 10px; }
    .bar-line { display: grid; grid-template-columns: 180px 1fr 90px; gap: 10px; align-items: center; }
    .line-label { color: var(--muted); font-size: 13px; }
    .bar-track { height: 12px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; position: relative; }
    .bar-fill { height: 100%; border-radius: 999px; }
    .bar-fill.high { background: linear-gradient(90deg, #dc2626, #f87171); }
    .bar-fill.low { background: linear-gradient(90deg, #15803d, #4ade80); }
    .bar-value { text-align: right; font-variant-numeric: tabular-nums; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 14px 10px; border-bottom: 1px solid rgba(255,255,255,.07); vertical-align: top; text-align: left; }
    th { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
    .job-name { font-weight: 700; margin-bottom: 4px; }
    .job-sub { color: var(--muted); font-size: 12px; }
    .why { color: var(--muted); font-size: 13px; margin-top: 8px; max-width: 50ch; }
    .source-list { margin: 10px 0 0; padding-left: 18px; color: var(--muted); }
    .source-list li { margin-bottom: 10px; }
    .source-list a { color: #93c5fd; text-decoration: none; border-bottom: 1px dashed rgba(147,197,253,.4); }
    .source-list a:hover { color: #bfdbfe; }
    .footer-note { color: var(--muted); font-size: 12px; margin-top: 10px; }
    .pill {
      display: inline-flex; align-items: center; gap: 8px; border: 1px solid var(--border); border-radius: 999px; padding: 7px 11px;
      background: rgba(255,255,255,.04); color: var(--soft); font-size: 12px; font-weight: 600;
    }
    footer {
      margin-top: 36px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,.08);
      color: var(--muted); display: flex; flex-wrap: wrap; gap: 12px; justify-content: space-between;
      font-size: 14px;
    }
    @media (max-width: 1080px) {
      .cards, .insight-cards, .legend, .duo, .takeaways, .sources { grid-template-columns: 1fr; }
      .bar-line { grid-template-columns: 1fr; }
      .compare-row { grid-template-columns: 1fr; }
      .topbar { position: static; }
    }
  </style>
</head>
<body>

  <script>
    const DATA = {
      summary: {
        totalJobsM: 143.1,
        weightedBaseOccupations: 341,
        allOccupations: 342,
        simpleAvg: 5.3,
        weightedAvg: 4.9,
        excludedOccupation: 'Military careers',
        repoUrl: 'https://github.com/mariodian/jobs/tree/filters',
        readmeUrl: 'https://github.com/mariodian/jobs/blob/filters/README.md',
        csvUrl: 'https://github.com/mariodian/jobs/blob/filters/occupations.csv',
        scoresUrl: 'https://github.com/mariodian/jobs/blob/filters/scores.json',
        blsUrl: 'https://www.bls.gov/ooh/'
      },
      groups: {
        high: { occupations: 60, jobsM: 25.21, sharePct: 17.6, weightedExposure: 8.57, weightedPay: 72799, weightedOutlook: 1.3 },
        mid: { occupations: 236, jobsM: 87.92, sharePct: 61.5, weightedExposure: 4.92, weightedPay: 66421, weightedOutlook: 3.1 },
        low: { occupations: 45, jobsM: 29.94, sharePct: 20.9, weightedExposure: 1.79, weightedPay: 41755, weightedOutlook: 5.9 }
      },
      highTop: [
        { title_en: 'Secretaries and administrative assistants', title_zh: '秘书与行政助理', jobsM: 3.45, pay: 47460, outlook: 0.0, education_en: 'High school diploma or equivalent', education_zh: '高中学历或同等学历', exposure: 8, why_en: 'A large share of the work is scheduling, drafting, filing, and information routing, which AI tools can already assist with.', why_zh: '很多工作是排程、起草、整理和转发信息，这些正是 AI 很容易切入的任务。' },
        { title_en: 'Customer service representatives', title_zh: '客服代表', jobsM: 2.81, pay: 42830, outlook: -5.0, education_en: 'High school diploma or equivalent', education_zh: '高中学历或同等学历', exposure: 9, why_en: 'Many requests follow repeatable scripts, so chatbots and AI agents can handle more of the first line.', why_zh: '很多客服问题有固定流程，因此聊天机器人和 AI agent 很适合先接住第一层需求。' },
        { title_en: 'General office clerks', title_zh: '办公室文员', jobsM: 2.65, pay: 43630, outlook: -7.0, education_en: 'High school diploma or equivalent', education_zh: '高中学历或同等学历', exposure: 9, why_en: 'Routine office processing and data handling are highly automatable once the workflow is digital.', why_zh: '一旦流程进入电脑，很多重复性的办公室处理和数据整理就更容易被自动化。' },
        { title_en: 'Software developers, quality assurance analysts, and testers', title_zh: '软件开发、测试与质量分析人员', jobsM: 1.9, pay: 131450, outlook: 15.0, education_en: "Bachelor's degree", education_zh: '学士学位', exposure: 9, why_en: 'Coding and testing are not disappearing, but AI can boost output per person, which can change team size and job shape.', why_zh: '写代码和测试不会消失，但 AI 能显著提高人均产出，所以团队规模和岗位形态都可能变化。' },
        { title_en: 'Bookkeeping, accounting, and auditing clerks', title_zh: '簿记、会计与审计文员', jobsM: 1.61, pay: 49210, outlook: -6.0, education_en: 'Some college, no degree', education_zh: '大学课程经历但无学位', exposure: 9, why_en: 'This work is structured, rules-based, and document-heavy, making it a natural target for automation.', why_zh: '这类工作规则明确、表单很多、流程标准化，本来就是自动化最容易吃进去的领域。' },
        { title_en: 'Accountants and auditors', title_zh: '会计与审计师', jobsM: 1.58, pay: 81680, outlook: 5.0, education_en: "Bachelor's degree", education_zh: '学士学位', exposure: 8, why_en: 'Higher-level judgment still matters, but data preparation, reconciliation, and first-pass analysis can be accelerated by AI.', why_zh: '高层判断仍然重要，但数据准备、核对和第一轮分析，已经越来越适合交给 AI 辅助。' }
      ],
      lowTop: [
        { title_en: 'Hand laborers and material movers', title_zh: '装卸与搬运工', jobsM: 6.95, pay: 37680, outlook: 4.0, education_en: 'No formal educational credential', education_zh: '无正式学历要求', exposure: 2, why_en: 'Moving objects in messy real-world environments still depends heavily on people, not just software.', why_zh: '在复杂真实环境里搬运东西，今天仍然主要依赖人，而不是纯软件。' },
        { title_en: 'Home health and personal care aides', title_zh: '居家健康与个人护理助理', jobsM: 4.35, pay: 34900, outlook: 17.0, education_en: 'High school diploma or equivalent', education_zh: '高中学历或同等学历', exposure: 2, why_en: 'Care work combines physical help, trust, and human presence, which are hard to replace with AI alone.', why_zh: '照护工作同时需要身体协助、信任和陪伴，这些都不是单靠 AI 就能替代的。' },

      renderTable('highTable', DATA.highTop, lang);
      renderTable('lowTable', DATA.lowTop, lang);
      document.querySelectorAll('.lang-btn').forEach(btn => {
        const active = btn.dataset.lang === lang;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-selected', active ? 'true' : 'false');
      });
    }
    document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => applyTranslations(btn.dataset.lang)));
    applyTranslations('zh');
  </script>
</body>
</html>
